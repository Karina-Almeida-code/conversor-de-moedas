<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="conversor.css">
    <title>Conversor de Moedas</title>
</head>

<body>

    <img src="https://cdn-icons-png.freepik.com/512/12026/12026425.png" 
    class="logo-moedas" alt="logo-conversor-de-moedas " width="220px">

    <main>

        <label>
            CONVERTER <b>de</b>
            <br>


            <select class="select-real">
                <option>R$ Real Brasileiro</option>
            </select>

        </label>

        <label>
            CONVERTER <b>para</b>
            <br>

            <select class="dolar-euro-select">
                <option value="dolar">US$ DÓLAR AMERICANO</option>
                <option value="euro">€ EURO</option>
                <option value="libra">£ LIBRA ESTRANGEIRA</option>
            </select>

        </label>

        <label>
            <b>Valor</b>
            <br>
            <input class="input-currency" placeholder="0,00">

        </label>
 
        <button class="convertButton" >Converter</button>

        <div>
            <img src="./img/brasil 2.png" alt="logo-br" class="imagem" >
            <p> <span>Real</span></p>
            <p class="real-br">R$ 0,00</p>

      
<img src="./img/seta.png" class="seta-roxa" alt="seta">

       
            <img class="currency-img" src="./img/estados-unidos (1) 1.png" alt="logo-eua" class="imagem" >
            <p id="dolar-ameicano">Dólar </p>
            <p class="dolar-americano">US$ 0,00</p>

        </div>

    </main>
</body>
<script src="./scripty.js"></script>

</html>
